<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>漫画沉浸式翻译助手</title>
  <style>
    :root {
      color-scheme: light;
    }

    body {
      width: 340px;
      margin: 0;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #111827;
      background: #f9fafb;
    }

    h3 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .hint {
      margin: 0 0 12px;
      color: #4b5563;
      font-size: 12px;
      line-height: 1.4;
    }

    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 10px;
    }

    .field {
      margin-bottom: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    label {
      font-size: 12px;
      color: #374151;
      font-weight: 600;
    }

    select,
    input {
      font-size: 12px;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid #d1d5db;
      outline: none;
      background: #fff;
    }

    input:focus,
    select:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 2px rgba(124, 58, 237, 0.15);
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      flex: 1;
      border: none;
      border-radius: 8px;
      padding: 10px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
    }

    #saveBtn {
      background: #e5e7eb;
      color: #111827;
    }

    #translateBtn {
      background: linear-gradient(90deg, #7c3aed, #ec4899);
      color: white;
    }

    .status {
      margin-top: 10px;
      min-height: 16px;
      font-size: 12px;
      color: #065f46;
    }
  </style>
</head>
<body>
  <h3>漫画沉浸式翻译助手</h3>
  <p class="hint">先配置 OCR/翻译供应商，再点击“翻译当前页面图片”。支持本地 PaddleOCR、LibreTranslate 与自定义 HTTP 接口。</p>

  <section class="card">
    <div class="field">
      <label for="ocrProvider">OCR 供应商</label>
      <select id="ocrProvider">
        <option value="local_paddle">本地 PaddleOCR（推荐）</option>
        <option value="custom_http">自定义 HTTP OCR</option>
      </select>
    </div>
    <div class="field">
      <label for="ocrEndpoint">OCR 接口地址</label>
      <input id="ocrEndpoint" placeholder="http://127.0.0.1:8000/api/ocr" />
    </div>
    <div class="field">
      <label for="ocrApiKey">OCR API Key（可选）</label>
      <input id="ocrApiKey" placeholder="可留空" type="password" />
    </div>
  </section>

  <section class="card">
    <div class="field">
      <label for="translationProvider">翻译供应商</label>
      <select id="translationProvider">
        <option value="none">不翻译（仅 OCR）</option>
        <option value="libretranslate">LibreTranslate</option>
        <option value="custom_http">自定义 HTTP 翻译</option>
      </select>
    </div>
    <div class="field">
      <label for="translationEndpoint">翻译接口地址</label>
      <input id="translationEndpoint" placeholder="https://libretranslate.com/translate" />
    </div>
    <div class="field">
      <label for="translationApiKey">翻译 API Key（可选）</label>
      <input id="translationApiKey" placeholder="可留空" type="password" />
    </div>
    <div class="field">
      <label for="targetLanguage">目标语言</label>
      <input id="targetLanguage" placeholder="zh" />
    </div>
  </section>

  <div class="actions">
    <button id="saveBtn">保存配置</button>
    <button id="translateBtn">翻译当前页面图片</button>
  </div>
  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
